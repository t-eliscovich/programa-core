{% extends "base.html" %}
{% block titulo %}Conciliación bancaria{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-6 px-4">

  <h1 class="text-xl font-semibold text-slate-900 dark:text-slate-100 mb-4">Conciliación con Pichincha</h1>

  <form method="POST" enctype="multipart/form-data"
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded p-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label class="flex items-center gap-3">
      <input type="file" name="archivo" accept=".xlsx" required
             class="text-sm text-slate-700 dark:text-slate-300
                    file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0
                    file:bg-slate-900 file:text-white dark:file:bg-slate-100 dark:file:text-slate-900
                    file:text-sm file:cursor-pointer">
      <button type="submit"
              class="px-4 py-1.5 rounded bg-sky-600 hover:bg-sky-700 text-white text-sm whitespace-nowrap">
        Procesar →
      </button>
    </label>
  </form>

</div>
{% endblock %}
